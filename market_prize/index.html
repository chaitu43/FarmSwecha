<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Price Checker</title>
  <link rel="stylesheet" type="text/css" href="style.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      max-width: 500px;
      width: 100%;
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
    }
    form {
      display: flex;
      flex-direction: column;
    }
    label {
      margin-bottom: 5px;
      font-weight: bold;
      color: #555;
    }
    select, input[type="number"] {
      padding: 10px;
      margin-bottom: 20px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 16px;
    }
    button {
      padding: 12px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      transition: background-color 0.3s;
    }
    button:hover {
      background-color: #218838;
    }
    #result {
      margin-top: 20px;
      padding: 15px;
      background-color: #000;
      color: #fff;
      border-radius: 5px;
      text-align: center;
      font-size: 18px;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .back-link {
      margin-top: 20px;
      text-align: center;
    }
    .back-link a {
      color: #007bff;
      text-decoration: none;
    }
    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Market Price Checker</h1>
    <form>
      <label for="product">Choose a product:</label>
      <select id="product" required>
        <option value="">Select a product</option>
        <option value="rice">Rice - బియ్యం</option>
        <option value="cheruku">Sugar Cane - చెరకు</option>
        <option value="jowar">Jowar - జొన్న</option>
        <option value="mirapakayalu">Chili - మిరపకాయలు</option>
        <option value="mokajonna">Corn - మొక్కజొన్న</option>
        <option value="patti">Cotton - పత్తి</option>
      </select>

      <label for="quantity">Enter quantity (in quintals):</label>
      <input type="number" id="quantity" min="0" step="0.01" required>

      <button type="button" onclick="calculatePrice()">Calculate Price</button>
    </form>

    <div id="result" role="status" aria-live="polite"></div>
  </div>

  <div class="back-link">
    <a href="../index.html">← Back to Home</a>
  </div>

  <script src="script.js"></script>
</body>

</html>
